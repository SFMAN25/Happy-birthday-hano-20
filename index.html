<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday Hend!</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: Arial, sans-serif;
        }
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            text-align: center;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        /* عناصر التهنئة مخفية في البداية وتظهر بعد الـ 10 ثواني */
        .celebration-content {
            opacity: 0;
            transform: scale(0.8);
            transition: all 1.5s ease-in-out;
            pointer-events: none;
        }
        .celebration-content.show {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        .message {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            background: rgba(255, 20, 147, 0.2);
            padding: 15px 30px;
            border-radius: 15px;
            font-size: 2.5em;
            animation: bounce 1s infinite alternate;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        .name {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 4em;
            font-weight: bold;
            z-index: 20;
            animation: colorChange 3s infinite;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
        }
        
        /* شاشة العد التنازلي المبدئية */
        #intro-countdown {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 6em;
            font-weight: bold;
            color: #ff1493;
            text-shadow: 0 0 30px #ff1493;
            z-index: 30;
            transition: opacity 0.5s ease;
            animation: pulse 1s infinite;
        }

        @keyframes bounce {
            0% { transform: translate(-50%, -50%) scale(1); }
            100% { transform: translate(-50%, -50%) scale(1.05); }
        }
        @keyframes colorChange {
            0%, 100% { color: #fff; text-shadow: 0 0 20px #ff69b4; }
            50% { color: #ff69b4; text-shadow: 0 0 20px #fff; }
        }
        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="intro-countdown">10</div>

        <div class="celebration-content" id="birthday-content">
            <div class="name">هند</div>
            <div class="message">🎉 كل سنة وأنتِ طيبة.. وعقبال 20 سنة! 🎂</div>
        </div>

        <canvas id="fireworks"></canvas>
        
        <audio id="bg-music" loop>
            <source src="https://files.catbox.moe/8qo1rh.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let startFireworks = false;

        class Firework {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.particles = [];
                for (let i = 0; i < 60; i++) {
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: (Math.random() - 0.5) * 8,
                        vy: (Math.random() - 0.5) * 8,
                        alpha: 1
                    });
                }
            }
            update() {
                this.particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.alpha -= 0.015;
                });
            }
            draw() {
                this.particles.forEach(p => {
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = p.alpha;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                });
            }
        }

        let fireworks = [];
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // تبدأ الألعاب النارية فقط بعد انتهاء العد التنازلي
            if (startFireworks && Math.random() < 0.25) {
                fireworks.push(new Firework(
                    Math.random() * canvas.width, 
                    Math.random() * canvas.height * 0.7, 
                    `hsl(${Math.random() * 360}, 100%, 60%)`
                ));
            }
            
            fireworks.forEach((fw, i) => {
                fw.update();
                fw.draw();
                fw.particles = fw.particles.filter(p => p.alpha > 0);
                if (fw.particles.length === 0) fireworks.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }
        animate();

        // منطق العد التنازلي لـ 10 ثواني وتشغيل الموسيقى والظهور
        let timeLeft = 10;
        const introCountdown = document.getElementById('intro-countdown');
        const birthdayContent = document.getElementById('birthday-content');
        const audio = document.getElementById('bg-music');

        const timer = setInterval(() => {
            timeLeft--;
            if (timeLeft > 0) {
                introCountdown.innerText = timeLeft;
            } else {
                clearInterval(timer);
                introCountdown.style.opacity = '0'; // إخفاء العداد
                
                setTimeout(() => {
                    introCountdown.remove(); // إزالة العداد تماماً من الصفحة
                    
                    // إظهار الاسم والتهنئة بشكل جميل
                    birthdayContent.classList.add('show');
                    
                    // تشغيل الألعاب النارية
                    startFireworks = true;
                    
                    // تشغيل الأغنية تلقائياً
                    audio.play().catch(error => {
                        console.log("المتصفح حظر التشغيل التلقائي، اضغط على الشاشة لتشغيل الصوت.");
                        // حل احتياطي في حال حظر المتصفح الصوت قبل تفاعل المستخدم
                        document.addEventListener('click', () => {
                            audio.play();
                        }, { once: true });
                    });
                }, 500);
            }
        }, 1000);

        // ضبط أبعاد الشاشة عند تغيير الحجم
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
