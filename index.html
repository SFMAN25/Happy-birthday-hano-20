<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday Henon!</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        /* حاوية التهنئة في منتصف الشاشة تماماً */
        .celebration-content {
            position: absolute;
            z-index: 10;
            text-align: center;
            opacity: 0;
            transform: scale(0.7);
            transition: all 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            background: rgba(0, 0, 0, 0.6);
            padding: 30px 50px;
            border-radius: 20px;
            border: 2px solid rgba(255, 105, 180, 0.3);
            box-shadow: 0 0 30px rgba(255, 20, 147, 0.2);
        }
        
        /* تفعيل الظهور */
        .celebration-content.show {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        /* أنيميشن الاسم بالألوان المتحركة */
        .name {
            font-size: 4.5em;
            font-weight: 900;
            margin-bottom: 10px;
            animation: textColorChange 4s infinite alternate, pulse 2s infinite ease-in-out;
        }

        /* أنيميشن نص التهنئة والعمر */
        .message {
            font-size: 2.5em;
            font-weight: bold;
            line-height: 1.6;
            animation: pulse 2s infinite ease-in-out;
        }

        .age-highlight {
            font-size: 1.3em;
            font-weight: 900;
            display: inline-block;
            animation: textColorChange 3s infinite reverse;
        }
        
        /* شاشة العد التنازلي من 10 لـ 0 */
        #intro-countdown {
            position: absolute;
            font-size: 8em;
            font-weight: 900;
            color: #ff1493;
            text-shadow: 0 0 20px #ff1493, 0 0 40px #ff69b4;
            z-index: 30;
            transition: opacity 0.4s ease, transform 0.4s ease;
            animation: countdownPulse 1s infinite;
        }

        /* زر التشغيل المبدئي لتفادي حظر الصوت من المتصفحات */
        #start-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .start-btn {
            background: #ff1493;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.8em;
            font-weight: bold;
            border-radius: 50px;
            box-shadow: 0 0 20px #ff1493;
            animation: pulse 1.5s infinite;
        }

        /* تأثيرات الحركة والتحول اللوني */
        @keyframes textColorChange {
            0% { color: #ff69b4; text-shadow: 0 0 15px #ff69b4, 0 0 30px #ff1493; }
            33% { color: #00ffff; text-shadow: 0 0 15px #00ffff, 0 0 30px #00bfff; }
            66% { color: #ffff00; text-shadow: 0 0 15px #ffff00, 0 0 30px #ffd700; }
            100% { color: #da70d6; text-shadow: 0 0 15px #da70d6, 0 0 ba55d3; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes countdownPulse {
            0% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
    </style>
</head>
<body>

    <!-- شاشة حماية لضمان عمل الصوت فوراً بمجرد الضغط -->
    <div id="start-overlay" onclick="startCelebration()">
        <button class="start-btn">اضغط لبدء المفاجأة 🎁</button>
    </div>

    <div id="container">
        <!-- عداد الـ 10 ثواني المبدئي -->
        <div id="intro-countdown" style="display: none;">10</div>

        <!-- محتوى عيد الميلاد الملون في منتصف الشاشة -->
        <div class="celebration-content" id="birthday-content">
            <div class="name">هنون 💕</div>
            <div class="message">
                🎉 كل سنة وأنتِ طيبة يا هنون 🎂<br>
                وعقبال العمر كله والـ <span class="age-highlight">20</span> سنة!
            </div>
        </div>

        <canvas id="fireworks"></canvas>
        
        <!-- رابط الأغنية -->
        <audio id="bg-music" loop>
            <source src="https://files.catbox.moe/7he7y7.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let startFireworks = false;

        class Firework {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.particles = [];
                for (let i = 0; i < 65; i++) {
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: (Math.random() - 0.5) * 9,
                        vy: (Math.random() - 0.5) * 9,
                        alpha: 1
                    });
                }
            }
            update() {
                this.particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.alpha -= 0.012;
                });
            }
            draw() {
                this.particles.forEach(p => {
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = p.alpha;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                });
            }
        }

        let fireworks = [];
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (startFireworks && Math.random() < 0.3) {
                fireworks.push(new Firework(
                    Math.random() * canvas.width, 
                    Math.random() * canvas.height * 0.65, 
                    `hsl(${Math.random() * 360}, 100%, 65%)`
                ));
            }
            
            fireworks.forEach((fw, i) => {
                fw.update();
                fw.draw();
                fw.particles = fw.particles.filter(p => p.alpha > 0);
                if (fw.particles.length === 0) fireworks.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }
        animate();

        // دالة بدء الاحتفال والمزامنة
        function startCelebration() {
            // إخفاء شاشة البداية
            document.getElementById('start-overlay').style.display = 'none';
            
            const introCountdown = document.getElementById('intro-countdown');
            const birthdayContent = document.getElementById('birthday-content');
            const audio = document.getElementById('bg-music');
            
            introCountdown.style.display = 'block';
            
            // تشغيل الأغنية فوراً مع بداية الـ 10 ثواني
            audio.play();

            let timeLeft = 10;
            const timer = setInterval(() => {
                timeLeft--;
                if (timeLeft >= 0) {
                    introCountdown.innerText = timeLeft;
                } else {
                    clearInterval(timer);
                    introCountdown.style.opacity = '0';
                    introCountdown.style.transform = 'scale(0)';
                    
                    setTimeout(() => {
                        introCountdown.remove();
                        
                        // إظهار الاسم والتهنئة في المنتصف مع انتهاء عد الأغنية
                        birthdayContent.classList.add('show');
                        
                        // إطلاق الألعاب النارية
                        startFireworks = true;
                    }, 400);
                }
            }, 1000);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
